function startAIConversation() {
  const lesson = LESSONS[currentLesson];
  if (!lesson || !lesson.sentences || lesson.sentences.length === 0) {
    addAIMessage('system', 'No lesson content available. Please select a lesson first.');
    return;
  }
  
  // Reset state
  aiDialogueState = {
    active: true,
    usedSentences: new Set(),
    usedQuestions: [],
    topicKeys: lesson.sentences.slice(0, 3).map(s => s.en.split(/\s+/).filter(w => w.length > 3).map(w => w.toLowerCase())).flat(),
  };
  
  // Clear messages except the intro
  const container = document.getElementById('aiChatMessages');
  container.innerHTML = '';
  
  addAIMessage('ai', "Hello! I'm your AI English tutor. Let's practice using the lesson. I'll ask you questions about the text, and you answer in English. Ready? Let's begin!");
  
  setAIChatEnabled(true);
  document.getElementById('aiChatStartBtn').textContent = '🔄 Restart Conversation';
  
  // Ask first question after a brief delay
  setTimeout(() => askAIQuestion(), 1000);
}

function askAIQuestion() {
  const lesson = LESSONS[currentLesson];
  const sentences = lesson.sentences;
  
  // Pick an unused sentence (or random if all used)
  let available = sentences.filter((_, i) => !aiDialogueState.usedSentences.has(i));
  if (available.length === 0) {
    // All sentences used — ask a wrap-up or review question
    const allWords = sentences.map(s => s.words.map(w => w.word)).flat().filter(w => w.length > 3);
    if (allWords.length > 0) {
      const word = allWords[Math.floor(Math.random() * allWords.length)];
      const q = `Great progress! Let's review. Can you make a new sentence using the word "${word}"?`;
      addAIMessage('ai', q);
      aiDialogueState.usedQuestions.push(q);
      return;
    }
    addAIMessage('ai', "You've answered questions about the whole lesson! Do you want to start a new round or switch to the quiz?");
    setAIChatEnabled(true);
    return;
  }
  
  // Pick a random available sentence
  const idx = Math.floor(Math.random() * available.length);
  const sentence = available[idx];
  const realIdx = sentences.indexOf(sentence);
  aiDialogueState.usedSentences.add(realIdx);
  
  // Choose a question template
  const template = AI_QUESTION_TEMPLATES[Math.floor(Math.random() * AI_QUESTION_TEMPLATES.length)];
  const question = template.pattern(sentence);
  
  addAIMessage('ai', question);
  aiDialogueState.usedQuestions.push(question);
  setAIChatEnabled(true);
}

function sendAIMessage() {
  const input = document.getElementById('aiChatInput');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  addAIMessage('user', text);
  setAIChatEnabled(false);
  
  // Evaluate the answer
  const feedback = evaluateAIAnswer(text);
  
  // Show typing indicator
  showAITyping(true);
  
  setTimeout(() => {
    showAITyping(false);
    addAIMessage('ai', '', feedback);
    
    // Small pause, then ask next question
    setTimeout(() => askAIQuestion(), 1500);
  }, 1500);
}

function evaluateAIAnswer(userAnswer) {
  const lesson = LESSONS[currentLesson];
  const sentences = lesson.sentences || [];
  const allLessonText = lesson.article_text.toLowerCase();
  const userWords = userAnswer.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  
  // Collect all key vocabulary from the lesson
  const allVocab = sentences.map(s => s.words.map(w => w.word.toLowerCase())).flat().filter(w => w.length > 2);
  const allContentWords = sentences.map(s => s.en.toLowerCase().split(/\s+/).filter(w => w.length > 3)).flat();
  
  // Count how many lesson-relevant words the user used
  const matchedVocab = allVocab.filter(v => userWords.some(uw => uw.includes(v) || v.includes(uw)));
  const matchedContent = allContentWords.filter(cw => userWords.some(uw => uw.includes(cw) || cw.includes(uw)));
  
  // Check answer length (reasonable answer should have 3+ meaningful words)
  const isLongEnough = userWords.length >= 3;
  const vocabScore = matchedVocab.length + matchedContent.length;
  
  // Generate feedback
  let encouragement = '';
  let grammarHint = '';
  let vocabHint = '';
  
  // Check for common grammar issues
  const commonErrors = [
    { pattern: /\bi\s+[a-z]/g, hint: "Capitalize 'I' when talking about yourself." },
    { pattern: /\b(he|she|it)\s+(don't|doesn't)\s+(\w+)\b/gi, hint: "With he/she/it, use 'doesn't' + base verb (e.g., 'doesn't go')." },
    { pattern: /\b(he|she|it)\s+(\w+[^s])\b/g, hint: "With he/she/it, add 's' to the verb (e.g., 'he goes')." },
    { pattern: /\byesterday\s+.+ed\b/gi, hint: "Simple past tense ending in '-ed' — good job using past tense!" },
  ];
  
  for (const err of commonErrors) {
    if (err.pattern.test(userAnswer)) {
      grammarHint = err.hint;
      break;
    }
  }
  
  // Vocab hint: suggest a lesson word they could have used
  const unusedVocab = allVocab.filter(v => !userWords.includes(v));
  if (unusedVocab.length > 0 && vocabScore < 2) {
    const suggest = unusedVocab[Math.floor(Math.random() * unusedVocab.length)];
    vocabHint = `Try using the word "${suggest}" from this lesson in your answer.`;
  }
  
  if (vocabScore >= 3 && isLongEnough) {
    encouragement = '🌟 Excellent answer! You used lesson vocabulary correctly.';
  } else if (vocabScore >= 1 && isLongEnough) {
    encouragement = '👍 Good attempt! You\'re using some lesson vocabulary.';
  } else if (isLongEnough) {
    encouragement = '💪 Nice try! Try to include more words from the lesson.';
  } else {
    encouragement = '🤔 Try writing a longer answer. What more can you say about the lesson?';
  }
  
  let feedbackHtml = `<div class="encourage">${encouragement}</div>`;
  if (vocabHint) {
    feedbackHtml += `<div class="vocab-hint">📖 ${vocabHint}</div>`;
  }
  if (grammarHint) {
    feedbackHtml += `<div class="grammar-hint">📝 ${grammarHint}</div>`;
  }
  
  // Auto-follow-up suggestions
  if (userAnswer.toLowerCase().includes('?')) {
    feedbackHtml += `<div style="margin-top:6px;font-size:12px;color:var(--text-muted);">Good question! Let me ask you another one.</div>`;
  }
  
  return feedbackHtml;
}

// Bind AI chat input
document.getElementById('aiChatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendAIMessage();
});
document.getElementById('aiChatSendBtn').addEventListener('click', sendAIMessage);

// ============== Start ==============
document.addEventListener('DOMContentLoaded', init);
</script>
