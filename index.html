<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DeepEng 英语学习 - 原型</title>
<script src="data.js"></script>
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --primary-bg: #EEF2FF;
  --success: #10B981;
  --danger: #EF4444;
  --warning: #F59E0B;
  --text: #1F2937;
  --text-muted: #6B7280;
  --bg: #F9FAFB;
  --card-bg: #FFFFFF;
  --border: #E5E7EB;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }
.container { max-width: 640px; margin: 0 auto; padding: 0 16px; }
.hidden { display: none !important; }

/* Header */
.header { background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 12px 0; }
.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.logo { font-size: 20px; font-weight: 700; color: var(--primary); }
.lesson-selector { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; }
.lesson-btn { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); background: var(--card-bg); color: var(--text-muted); font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; }
.lesson-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.lesson-btn.completed { border-color: var(--success); color: var(--success); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin: 16px 0; background: var(--card-bg); border-radius: var(--radius); padding: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.tab { flex: 1; padding: 10px 4px; border: none; background: transparent; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .2s; white-space: nowrap; }
.tab.active { background: var(--primary); color: white; }
.tab .tab-icon { display: block; font-size: 20px; margin-bottom: 2px; }

/* Card */
.card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }

/* Audio Bar */
.audio-bar { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--primary-bg); border-radius: var(--radius); margin-bottom: 16px; }
.play-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.play-btn:active { transform: scale(.95); }
.progress-bar { flex: 1; height: 6px; background: #D1D5DB; border-radius: 3px; overflow: hidden; cursor: pointer; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 3px; width: 0%; transition: width .1s; }
.time-display { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* 课文 (Reading) */
.sentence-list { list-style: none; }
.sentence-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .2s; position: relative; }
.sentence-item:last-child { border-bottom: none; }
.sentence-item.active { background: var(--primary-bg); border-left: 3px solid var(--primary); }
.sentence-item .en { font-size: 18px; font-weight: 500; margin-bottom: 2px; }
.sentence-item .zh { font-size: 14px; color: var(--text-muted); display: none; }
.sentence-item.show-zh .zh { display: block; }
.sentence-item .sid { position: absolute; top: 8px; right: 12px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
.progress-text { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

/* 盲听 (Blind Listening) */
.blind-mode { text-align: center; }
.blind-state { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
.blind-transcript { font-size: 22px; font-weight: 600; margin-bottom: 20px; min-height: 60px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .5s; }
.blind-transcript.reveal { opacity: 1; }
.blind-result { margin-bottom: 16px; min-height: 40px; }
.blind-result-item { display: inline-block; width: 32px; height: 32px; border-radius: 50%; margin: 4px; line-height: 32px; text-align: center; font-size: 14px; font-weight: 600; }
.blind-result-item.got { background: #D1FAE5; color: #065F46; }
.blind-result-item.not-got { background: #FEE2E2; color: #991B1B; }
.blind-result-item.pending { background: #F3F4F6; color: var(--text-muted); }
.blind-result-item.active-dot { background: var(--primary); color: white; border: 2px solid var(--primary-light); }

/* Blind controls */
.blind-controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.blind-btn { padding: 12px 28px; border-radius: 24px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; }
.blind-btn:active { transform: scale(.95); }
.blind-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.blind-btn.got { background: var(--success); color: white; }
.blind-btn.not-got { background: var(--danger); color: white; }
.blind-btn.replay { background: var(--primary); color: white; }
.blind-btn.play { background: var(--primary); color: white; font-size: 17px; padding: 14px 40px; }
.blind-btn.pause { background: var(--warning); color: white; font-size: 24px; width: 60px; height: 60px; padding: 0; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }

/* Blind playback bar */
.blind-playback-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.blind-progress { flex: 1; height: 6px; background: #D1D5DB; border-radius: 3px; overflow: hidden; }
.blind-progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }
.blind-time { font-size: 12px; color: var(--text-muted); min-width: 80px; text-align: right; }

/* 精听 (Intensive Listening) */
.intensive-sentence { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
.intensive-sentence:last-child { border-bottom: none; }
.intensive-sentence .en { font-size: 18px; line-height: 1.8; }
.intensive-sentence .en .word { cursor: pointer; display: inline-block; padding: 2px 4px; border-radius: 4px; transition: all .2s; }
.intensive-sentence .en .word:hover { background: #FEF3C7; }
.intensive-sentence .en .word.known { background: #D1FAE5; color: #065F46; }
.intensive-sentence .en .word.selected { background: #FEF3C7; position: relative; }
.intensive-sentence .en .word .play-icon { font-size: 10px; vertical-align: super; }
.word-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.2); z-index: 200; width: 280px; }
.word-popup h3 { font-size: 24px; margin-bottom: 4px; }
.word-popup .ipa { font-size: 16px; color: var(--text-muted); margin-bottom: 8px; }
.word-popup .def { font-size: 18px; margin-bottom: 16px; }
.word-popup .popup-btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.word-popup .popup-btn.known { background: var(--success); color: white; }
.word-popup .popup-btn.close { background: var(--bg); color: var(--text); }
.word-popup .popup-btn.play { background: var(--primary); color: white; }
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.3); z-index: 199; }

/* 跟读 (Repeat) */
.repeat-mode { text-align: center; }
.repeat-sentence { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.repeat-zh { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.repeat-controls { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
.repeat-btn { padding: 16px 32px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; transition: all .2s; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
.repeat-btn.listen { background: var(--primary); color: white; }
.repeat-btn.record { background: var(--danger); color: white; }
.repeat-btn:active { transform: scale(.9); }
.repeat-btn.recording { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.repeat-score { margin-top: 16px; }
.repeat-score .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 6px solid; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 36px; font-weight: 700; }
.repeat-score .score-detail { font-size: 14px; color: var(--text-muted); }
.repeat-progress { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.repeat-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-muted); }
.repeat-dot.done { background: var(--success); border-color: var(--success); color: white; }
.repeat-dot.active { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
.repeat-sentence-num { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.repeat-visual { position: relative; min-height: 100px; }
.repeat-listening { font-size: 12px; color: var(--primary); margin-top: 8px; min-height: 20px; }
.repeat-listening .listening-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-right: 6px; animation: pulse 0.8s infinite; }

/* Repeat new controls */
.repeat-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; }
.repeat-nav-btn { padding: 10px 20px; border: 2px solid var(--border); border-radius: 24px; background: var(--card-bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.repeat-nav-btn:active { transform: scale(.95); }
.repeat-nav-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.repeat-nav-btn.prev { border-color: var(--primary-light); color: var(--primary); }
.repeat-nav-btn.next { border-color: var(--primary); color: var(--primary); }

.repeat-image { width: 100%; max-height: 240px; border-radius: var(--radius); object-fit: cover; margin-bottom: 16px; background: #F3F4F6; display: block; }

.repeat-pause-btn { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--warning); background: var(--card-bg); color: var(--warning); font-size: 20px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .2s; }
.repeat-pause-btn:active { transform: scale(.9); }
.repeat-pause-btn.playing { border-color: var(--primary); color: var(--primary); }

/* Repeat recording result panel */
.repeat-result { margin-top: 16px; padding: 16px; background: var(--primary-bg); border-radius: var(--radius); }
.repeat-result .result-playback { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; justify-content: center; }
.repeat-result .result-playback .playback-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.repeat-result .result-playback .playback-label { font-size: 13px; color: var(--text-muted); }
.repeat-result .sub-scores { margin-bottom: 16px; }
.repeat-result .sub-score-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
.repeat-result .sub-score-row:last-child { border-bottom: none; }
.repeat-result .sub-score-label { font-size: 13px; color: var(--text); }
.repeat-result .sub-score-bar { width: 100px; height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; margin: 0 8px; }
.repeat-result .sub-score-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.repeat-result .sub-score-num { font-size: 14px; font-weight: 700; min-width: 30px; text-align: right; }
.repeat-result .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.repeat-result .result-btn { padding: 10px 24px; border-radius: 24px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.repeat-result .result-btn:active { transform: scale(.95); }
.repeat-result .result-btn.rerecord { background: var(--warning); color: white; }
.repeat-result .result-btn.next-sentence { background: var(--primary); color: white; }
.repeat-result .result-btn.done { background: var(--success); color: white; }
.repeat-result .result-total { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; text-align: center; }

/* 测试 (Quiz) */
.quiz-question { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.quiz-option { display: block; width: 100%; padding: 16px; margin-bottom: 10px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--card-bg); font-size: 16px; cursor: pointer; transition: all .2s; text-align: left; }
.quiz-option:active { transform: scale(.98); }
.quiz-option.correct { border-color: var(--success); background: #D1FAE5; }
.quiz-option.wrong { border-color: var(--danger); background: #FEE2E2; }
.quiz-option:disabled { cursor: default; }
.quiz-result { margin-top: 16px; padding: 16px; border-radius: var(--radius); }
.quiz-result.correct { background: #D1FAE5; }
.quiz-result.wrong { background: #FEE2E2; }
.quiz-score { text-align: center; margin-bottom: 16px; }
.quiz-score .big { font-size: 48px; font-weight: 700; color: var(--primary); }
.quiz-score .total { font-size: 18px; color: var(--text-muted); }
.quiz-next { display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius); background: var(--primary); color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
.quiz-again { display: block; width: 100%; padding: 14px; border: 2px solid var(--primary); border-radius: var(--radius); background: transparent; color: var(--primary); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }

/* Reading with images */
.sentence-with-img { display: flex; gap: 12px; align-items: flex-start; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .2s; }
.sentence-with-img:last-child { border-bottom: none; }
.sentence-with-img.active { background: var(--primary-bg); border-left: 3px solid var(--primary); }
.sentence-with-img .sent-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #F3F4F6; }
.sentence-with-img .sent-text { flex: 1; min-width: 0; }
.sentence-with-img .sent-text .en { font-size: 17px; font-weight: 500; margin-bottom: 2px; line-height: 1.5; }
.sentence-with-img .sent-text .zh { font-size: 13px; color: var(--text-muted); display: none; }
.sentence-with-img.show-zh .sent-text .zh { display: block; }
.sentence-with-img .sid { font-size: 11px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
.status-bar { display: flex; justify-content: space-between; padding: 8px 0; font-size: 12px; color: var(--text-muted); }
.fullscreen-toggle-btn { display: block; width: 100%; padding: 10px; margin-bottom: 12px; border: 2px dashed var(--primary); border-radius: var(--radius); background: transparent; color: var(--primary); font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; transition: all .2s; }
.fullscreen-toggle-btn:active { transform: scale(.98); background: var(--primary-bg); }

/* 全屏翻页阅读 (Fullscreen Page Turn) */
.reading-fullscreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 500; display: flex; flex-direction: column; overflow: hidden; }
.reading-fullscreen.hidden { display: none; }
.reading-fullscreen .fullscreen-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--card-bg); z-index: 2; }
.reading-fullscreen .fullscreen-header .back-btn { width: 40px; height: 40px; border: none; background: transparent; font-size: 22px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.reading-fullscreen .fullscreen-header .back-btn:active { background: var(--bg); }
.reading-fullscreen .fullscreen-header .title-text { font-size: 16px; font-weight: 600; color: var(--text); }
.reading-fullscreen .fullscreen-header .toggle-zh-btn { padding: 6px 14px; border: 1px solid var(--primary); border-radius: 16px; background: transparent; color: var(--primary); font-size: 13px; font-weight: 500; cursor: pointer; }
.reading-fullscreen .fullscreen-header .toggle-zh-btn.active { background: var(--primary); color: white; }
.reading-fullscreen .fullscreen-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 20px; position: relative; overflow: hidden; min-height: 0; }
.reading-fullscreen .fullscreen-img-wrap { width: 100%; max-width: 500px; aspect-ratio: 16/10; border-radius: 16px; overflow: hidden; background: #F3F4F6; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; position: relative; }
.reading-fullscreen .fullscreen-img { width: 100%; height: 100%; object-fit: contain; }
.reading-fullscreen .fullscreen-sentence { font-size: clamp(22px, 5vw, 32px); font-weight: 600; line-height: 1.6; text-align: center; padding: 0 8px; transition: all .3s; max-width: 500px; }
.reading-fullscreen .fullscreen-sentence-zh { font-size: clamp(16px, 3.5vw, 22px); color: var(--text-muted); margin-top: 12px; text-align: center; max-width: 500px; display: none; }
.reading-fullscreen .fullscreen-sentence-zh.show { display: block; }
.reading-fullscreen .fullscreen-footer { padding: 12px 16px 20px; border-top: 1px solid var(--border); background: var(--card-bg); }
.reading-fullscreen .fullscreen-progress-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.reading-fullscreen .fullscreen-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all .3s; }
.reading-fullscreen .fullscreen-dot.active { background: var(--primary); transform: scale(1.3); }
.reading-fullscreen .fullscreen-dot.done { background: var(--primary-light); }
.reading-fullscreen .fullscreen-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.reading-fullscreen .fullscreen-nav .nav-btn { width: 56px; height: 56px; border: none; border-radius: 50%; background: var(--primary); color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
.reading-fullscreen .fullscreen-nav .nav-btn:active { transform: scale(.9); }
.reading-fullscreen .fullscreen-nav .nav-btn:disabled { opacity: .3; pointer-events: none; }
.reading-fullscreen .fullscreen-nav .nav-btn.backward { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
.reading-fullscreen .fullscreen-nav .page-indicator { font-size: 15px; font-weight: 600; color: var(--text); text-align: center; flex: 1; }
.reading-fullscreen .fullscreen-nav .page-indicator small { font-weight: 400; color: var(--text-muted); }

/* Page turn animation */
.page-turn-enter { animation: slideInFromRight .35s ease-out; }
.page-turn-exit { animation: slideOutToLeft .35s ease-out; }
.page-turn-enter-back { animation: slideInFromLeft .35s ease-out; }
@keyframes slideInFromRight { from { transform: translateX(100px); opacity: .3; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOutToLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-60px); opacity: 0; } }
@keyframes slideInFromLeft { from { transform: translateX(-100px); opacity: .3; } to { transform: translateX(0); opacity: 1; } }

/* Tap areas for swipe */
.reading-fullscreen .tap-areas { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; z-index: 1; }
.reading-fullscreen .tap-areas .tap-prev { flex: 1; cursor: pointer; }
.reading-fullscreen .tap-areas .tap-center { flex: 2; cursor: pointer; }
.reading-fullscreen .tap-areas .tap-next { flex: 1; cursor: pointer; }

/* AI Dialogue Chat */
.ai-sub-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg); border-radius: 8px; padding: 3px; }
.ai-sub-tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .2s; }
.ai-sub-tab.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

.ai-chat-container { display: flex; flex-direction: column; height: 480px; max-height: 70vh; }
.ai-chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
.ai-msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; animation: fadeIn .3s ease; }
.ai-msg.ai { align-self: flex-start; background: var(--primary-bg); color: var(--text); border-bottom-left-radius: 4px; }
.ai-msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
.ai-msg.system { align-self: center; background: #FEF3C7; color: #92400E; font-size: 13px; border-radius: 12px; text-align: center; max-width: 90%; }
.ai-msg .msg-label { font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: .7; text-transform: uppercase; letter-spacing: .5px; }
.ai-msg.user .msg-label { color: rgba(255,255,255,.8); }
.ai-msg.ai .msg-label { color: var(--primary); }
.ai-msg .msg-feedback { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.1); font-size: 13px; }
.ai-msg .msg-feedback .hint-label { font-weight: 600; color: var(--primary); }
.ai-msg .msg-feedback .hint-text { color: var(--text-muted); }
.ai-input-bar { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--card-bg); border-radius: 0 0 var(--radius) var(--radius); }
.ai-input { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 24px; font-size: 15px; outline: none; transition: border-color .2s; }
.ai-input:focus { border-color: var(--primary); }
.ai-input:disabled { background: var(--bg); opacity: .6; }
.ai-send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
.ai-send-btn:active { transform: scale(.9); }
.ai-send-btn:disabled { opacity: .4; cursor: default; }
.ai-start-btn { display: block; width: 100%; padding: 16px; border: 2px dashed var(--primary); border-radius: var(--radius); background: transparent; color: var(--primary); font-size: 16px; font-weight: 600; cursor: pointer; transition: all .2s; margin-bottom: 12px; }
.ai-start-btn:hover { background: var(--primary-bg); }
.ai-start-btn:active { transform: scale(.98); }
.ai-typing { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
.ai-typing .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary-light); animation: typingBounce 1.4s infinite; }
.ai-typing .dot:nth-child(2) { animation-delay: .2s; }
.ai-typing .dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.ai-msg .msg-feedback .grammar-hint { color: #7C3AED; }
.ai-msg .msg-feedback .vocab-hint { color: #059669; }
.ai-msg .msg-feedback .encourage { font-weight: 600; }

/* AI Voice: TTS speaker button on AI messages */
.ai-msg.ai .speaker-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 14px;
  cursor: pointer;
  margin-top: 8px;
  transition: all .2s;
  flex-shrink: 0;
}
.ai-msg.ai .speaker-btn:active { transform: scale(.9); }
.ai-msg.ai .speaker-btn.speaking { background: var(--success); animation: pulse 0.8s infinite; }

/* Mic button in input bar */
.ai-mic-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--card-bg);
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .2s;
}
.ai-mic-btn:active { transform: scale(.9); }
.ai-mic-btn.recording {
  border-color: var(--danger);
  background: #FEE2E2;
  color: var(--danger);
  animation: micPulse 1s infinite;
}
@keyframes micPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}

/* Recording status indicator */
.ai-voice-status {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  padding: 4px 0;
  min-height: 22px;
  transition: all .2s;
}
.ai-voice-status.recording {
  color: var(--danger);
  font-weight: 600;
}
.ai-voice-status.done {
  color: var(--success);
}

/* TTS toggle */
.ai-tts-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  transition: all .2s;
  user-select: none;
}
.ai-tts-toggle.active {
  background: var(--primary-bg);
  border-color: var(--primary-light);
  color: var(--primary);
}

/* Notifications */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity .3s; }
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 0 12px; }
  .tab { font-size: 12px; }
  .tab .tab-icon { font-size: 18px; }
  .sentence-item .en { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="container header-inner">
    <div class="logo">DeepEng</div>
    <div class="lesson-selector" id="lessonSelector"></div>
  </div>
</div>

<div class="container">
  <div class="tabs" id="tabBar">
    <button class="tab active" data-tab="reading"><span class="tab-icon">📖</span>课文</button>
    <button class="tab" data-tab="blind"><span class="tab-icon">🎧</span>盲听</button>
    <button class="tab" data-tab="intensive"><span class="tab-icon">🔍</span>精听</button>
    <button class="tab" data-tab="repeat"><span class="tab-icon">🎤</span>跟读</button>
    <button class="tab" data-tab="quiz"><span class="tab-icon">✍️</span>测试</button>
  </div>

  <!-- 课文 (Reading) -->
  <div id="readingPanel" class="panel">
    <div class="card">
      <div class="audio-bar">
        <button class="play-btn" id="readingPlayBtn">▶</button>
        <div class="progress-bar" id="readingProgress">
          <div class="progress-fill" id="readingProgressFill"></div>
        </div>
        <span class="time-display" id="readingTime">0:00 / 0:00</span>
      </div>
      <div class="progress-text" id="readingProgressText">自然朗读</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="fullscreen-toggle-btn" onclick="enterFullscreen(0)" style="margin-bottom:0;flex:1;">📖 全屏翻页阅读</button>
        <button class="fullscreen-toggle-btn" onclick="toggleReadingZh()" style="margin-bottom:0;flex:0;padding:10px 16px;width:auto;border-style:solid;">中</button>
      </div>
      <ul class="sentence-list" id="readingSentences"></ul>
    </div>
  </div>

  <!-- 盲听 (Blind Listening) -->
  <div id="blindPanel" class="panel hidden">
    <div class="card blind-mode">
      <div class="blind-state" id="blindState">准备开始盲听训练</div>
      <!-- Playback bar (shown during playback) -->
      <div class="blind-playback-bar hidden" id="blindPlaybackBar">
        <div class="blind-progress"><div class="blind-progress-fill" id="blindProgressFill"></div></div>
        <span class="blind-time" id="blindTime">0:00</span>
      </div>
      <!-- Transcript (revealed only on 'got') -->
      <div class="blind-transcript" id="blindTranscript"></div>
      <!-- Result dots -->
      <div class="blind-result" id="blindResult"></div>
      <!-- Controls Phase 1: Start -->
      <div class="blind-controls" id="blindStartArea">
        <button class="blind-btn play" id="blindStartBtn">▶ 开始盲听</button>
      </div>
      <!-- Controls Phase 2: During playback -->
      <div class="blind-controls hidden" id="blindPlayArea">
        <button class="blind-btn pause" id="blindPauseBtn">⏸</button>
      </div>
      <!-- Controls Phase 3: After audio ends - judgment -->
      <div class="blind-controls hidden" id="blindJudgeArea">
        <button class="blind-btn got" id="blindGotBtn">✅ 听懂 ✓</button>
        <button class="blind-btn not-got" id="blindNotGotBtn">❌ 没懂 ✗</button>
        <button class="blind-btn replay" id="blindReplayBtn">🔄 单句重放</button>
        <button class="blind-btn replay" id="blindReplayAllBtn">🔄 整段重放</button>
      </div>
    </div>
  </div>

  <!-- 精听 (Intensive Listening) -->
  <div id="intensivePanel" class="panel hidden">
    <div class="card">
      <div class="intensive-list" id="intensiveSentences"></div>
    </div>
  </div>

  <!-- 跟读 (Repeat) -->
  <div id="repeatPanel" class="panel hidden">
    <div class="card repeat-mode">
      <div class="repeat-progress" id="repeatProgress"></div>
      <!-- Navigation row -->
      <div class="repeat-nav">
        <button class="repeat-nav-btn prev" id="repeatPrevBtn" onclick="repeatPrevSentence()">◀ 上一句</button>
        <button class="repeat-nav-btn next" id="repeatNextBtn" onclick="repeatNextSentence()">下一句 ▶</button>
      </div>
      <div class="repeat-sentence-num" id="repeatSentenceNum">第 1 句</div>
      <!-- Scene image -->
      <img class="repeat-image" id="repeatImage" src="" alt="" onerror="this.style.display='none'">
      <div class="repeat-visual">
        <div class="repeat-sentence" id="repeatSentence">—</div>
        <div class="repeat-zh" id="repeatZh">—</div>
        <div class="repeat-listening hidden" id="repeatListening"><span class="listening-dot"></span>播放中...</div>
      </div>
      <div class="repeat-controls">
        <button class="repeat-btn listen" id="repeatListenBtn" onclick="repeatPlayCurrentSentence()">🔊</button>
        <button class="repeat-pause-btn playing" id="repeatPauseBtn" onclick="repeatTogglePause()">⏸</button>
        <button class="repeat-btn record" id="repeatRecordBtn" onclick="repeatToggleRecord()">🎙️</button>
      </div>
      <!-- Result panel (shown after recording with sub-scores + actions) -->
      <div class="repeat-result hidden" id="repeatResultPanel">
        <div class="result-playback">
          <button class="playback-btn" id="repeatPlaybackBtn" onclick="repeatPlayRecording()">▶</button>
          <span class="playback-label">回听录音</span>
          <span style="font-size:12px;color:var(--text-muted);margin-left:8px;" id="repeatPlaybackStatus"></span>
        </div>
        <div class="result-total" id="repeatResultTotal">总分：<strong>0</strong> 分</div>
        <div class="sub-scores" id="repeatSubScores"></div>
        <div class="result-actions">
          <button class="result-btn rerecord" onclick="repeatReRecord()">🔄 重录</button>
          <button class="result-btn next-sentence" id="repeatNextSentenceBtn" onclick="repeatGoNext()">下一句 →</button>
        </div>
      </div>
      <!-- Old score circle (hidden, kept for fallback) -->
      <div class="repeat-score hidden" id="repeatScore">
        <div class="score-circle" id="repeatScoreCircle">0</div>
        <div class="score-detail" id="repeatScoreDetail"></div>
      </div>
    </div>
  </div>

  <!-- 测试 (Quiz) -->
  <div id="quizPanel" class="panel hidden">
    <div class="card">
      <div class="ai-sub-tabs">
        <button class="ai-sub-tab active" data-sub="quiz" onclick="switchQuizSub('quiz')">📝 Quiz</button>
        <button class="ai-sub-tab" data-sub="ai-chat" onclick="switchQuizSub('ai-chat')">💬 AI Dialogue</button>
      </div>
      <div id="quizContent"></div>
      <div id="aiChatPanel" class="hidden">
        <div class="ai-chat-container" id="aiChatContainer">
          <div class="ai-chat-messages" id="aiChatMessages">
            <div class="ai-msg ai">
              <div class="msg-label">AI Tutor</div>
              Click the button below to start an English conversation about this lesson. I'll ask questions and help you practice!
            </div>
          </div>
          <div style="padding:0 12px;">
            <div class="ai-voice-status" id="aiVoiceStatus"></div>
          </div>
          <div class="ai-input-bar">
            <input type="text" class="ai-input" id="aiChatInput" placeholder="Type your answer in English..." disabled>
            <button class="ai-mic-btn" id="aiMicBtn" title="Voice input" disabled>🎤</button>
            <button class="ai-send-btn" id="aiChatSendBtn" disabled>➤</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <button class="ai-start-btn" id="aiChatStartBtn" onclick="startAIConversation()" style="margin-bottom:0;flex:1;">🎯 Start AI Conversation</button>
          <button class="ai-tts-toggle active" id="aiTtsToggle" onclick="toggleTTS()">🔊 TTS</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay"></div>
<div class="word-popup hidden" id="wordPopup">
  <h3 id="popupWord"></h3>
  <div class="ipa" id="popupIpa"></div>
  <div class="def" id="popupDef"></div>
  <button class="popup-btn play" id="popupPlayBtn">🔊 Play</button>
  <button class="popup-btn close" id="popupCloseBtn">Close</button>
</div>

<!-- 全屏翻页阅读 (Fullscreen Page Turn) -->
<div class="reading-fullscreen hidden" id="fullscreenPanel">
  <div class="fullscreen-header">
    <button class="back-btn" onclick="exitFullscreen()">✕</button>
    <span class="title-text" id="fullscreenTitle">课文阅读</span>
    <button class="toggle-zh-btn" id="fullscreenZhBtn" onclick="toggleFullscreenZh()">中文</button>
  </div>
  <div class="fullscreen-body" id="fullscreenBody">
    <div class="tap-areas">
      <div class="tap-prev" onclick="pageTurn(-1)"></div>
      <div class="tap-center" onclick="toggleFullscreenZh()"></div>
      <div class="tap-next" onclick="pageTurn(1)"></div>
    </div>
    <div class="fullscreen-img-wrap" id="fullscreenImgWrap">
      <img class="fullscreen-img" id="fullscreenImg" src="" alt="" onerror="this.style.display='none'">
    </div>
    <div class="fullscreen-sentence" id="fullscreenSentence"></div>
    <div class="fullscreen-sentence-zh" id="fullscreenSentenceZh"></div>
  </div>
  <div class="fullscreen-footer">
    <div class="fullscreen-progress-dots" id="fullscreenDots"></div>
    <div class="fullscreen-nav">
      <button class="nav-btn backward" onclick="pageTurn(-1)">◀</button>
      <div class="page-indicator" id="fullscreenPageNum">第 0/0 句</div>
      <button class="nav-btn" onclick="pageTurn(1)">▶</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============== State ==============
let currentLesson = 0;
let currentTab = 'reading';
let audioContext = null;
let articleAudio = null;
let isPlaying = false;

// Blind listening state
let blindState = { current: 0, history: [], isPaused: false, audioEl: null };

// Intensive listening state (no longer needs knownWords tracking)

// Repeat state
let repeatState = { current: 0, scores: [], recordingBlob: null, recordingUrl: null, showResult: false };
let repeatPaused = false;

// Quiz state
let quizState = { current: 0, answers: [], done: false };

// ============== Init ==============
function init() {
  renderLessonSelector();
  selectLesson(0);
  bindTabs();
  bindOverlay();
}

function renderLessonSelector() {
  const el = document.getElementById('lessonSelector');
  el.innerHTML = LESSONS.map((l, i) => 
    `<button class="lesson-btn ${i === 0 ? 'active' : ''}" data-idx="${i}">${l.id}</button>`
  ).join('');
  el.addEventListener('click', (e) => {
    const btn = e.target.closest('.lesson-btn');
    if (!btn) return;
    selectLesson(parseInt(btn.dataset.idx));
  });
}

function selectLesson(idx) {
  currentLesson = idx;
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.idx) === idx));
  const lesson = LESSONS[idx];
  document.querySelector('.logo').textContent = `DeepEng · L${lesson.id} ${lesson.title}`;
  resetAllModes();
  renderReading();
  renderIntensive();
  renderQuiz();
  switchTab(currentTab);
}

function resetAllModes() {
  if (articleAudio) { articleAudio.pause(); articleAudio = null; }
  isPlaying = false;
  document.getElementById('readingPlayBtn').textContent = '▶';
  
  blindState = { current: 0, history: [], isPaused: false, audioEl: null };
  repeatState = { current: 0, scores: [], recordingBlob: null, recordingUrl: null, showResult: false };
  repeatPaused = false;
  quizState = { current: 0, answers: [], done: false };
  resetAIDialogue();
  if (repeatAudio) { repeatAudio.pause(); repeatAudio = null; }
  if (repeatRecordingAudio) { repeatRecordingAudio.pause(); repeatRecordingAudio = null; }
  if (repeatState.recordingUrl) { URL.revokeObjectURL(repeatState.recordingUrl); repeatState.recordingUrl = null; }
  repeatState.recordingBlob = null;
}

// ============== Tabs ==============
function bindTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      switchTab(tab.dataset.tab);
    });
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
  document.getElementById(`${tab}Panel`).classList.remove('hidden');
  
  // Cleanup blind audio when leaving blind tab
  if (tab !== 'blind') cleanupBlindAudio();
  
  if (tab === 'blind') renderBlind();
  if (tab === 'repeat') renderRepeat();
  if (tab === 'quiz') renderQuiz();
}

// ============== Audio Helpers ==============
function getAudioUrl(path) {
  // Paths are relative to workspace root
  return path;
}

function playArticleAudio(onTimeUpdate) {
  const lesson = LESSONS[currentLesson];
  if (!lesson.audio_full) return;
  
  if (articleAudio) { articleAudio.pause(); articleAudio = null; }
  
  articleAudio = new Audio(getAudioUrl(lesson.audio_full));
  articleAudio.addEventListener('timeupdate', () => {
    if (onTimeUpdate) onTimeUpdate(articleAudio.currentTime, articleAudio.duration);
  });
  articleAudio.addEventListener('ended', () => {
    isPlaying = false;
    document.getElementById('readingPlayBtn').textContent = '▶';
  });
  articleAudio.play().then(() => {
    isPlaying = true;
    document.getElementById('readingPlayBtn').textContent = '⏸';
  }).catch(() => {});
}

function toggleArticlePlay() {
  if (isPlaying && articleAudio) {
    articleAudio.pause();
    isPlaying = false;
    document.getElementById('readingPlayBtn').textContent = '▶';
  } else {
    const lesson = LESSONS[currentLesson];
    if (!lesson.audio_full) {
      showToast('暂无完整课文音频');
      return;
    }
    playArticleAudio((ct, dur) => {
      const pct = dur ? (ct/dur*100) : 0;
      document.getElementById('readingProgressFill').style.width = pct + '%';
      const fmt = (s) => { const m = Math.floor(s/60); return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`; };
      document.getElementById('readingTime').textContent = `${fmt(ct)} / ${fmt(dur)}`;
    });
  }
}

/**
 * Play individual sentence audio from audio/lesson_XX/sYY_normal.mp3
 * @param {number} idx - Sentence index (0-based)
 * @param {boolean} isSlow - Whether to play slow version
 */
function playSentence(idx, isSlow, onEnded) {
  const lesson = LESSONS[currentLesson];
  const s = lesson.sentences[idx];
  if (!s) return;

  const lessonNum = String(currentLesson + 1).padStart(2, '0');
  const sentNum = String(idx + 1).padStart(2, '0');
  const speed = isSlow ? 'slow' : 'normal';
  const audioPath = `audio/lesson_${lessonNum}/s${sentNum}_${speed}.mp3`;

  // Stop any existing per-sentence audio
  if (window._sentenceAudio) {
    window._sentenceAudio.pause();
    window._sentenceAudio.onended = null;
    window._sentenceAudio = null;
  }

  const audio = new Audio(getAudioUrl(audioPath));
  window._sentenceAudio = audio;
  audio.onended = onEnded || null;
  audio.play().catch(() => {
    // Fallback: if individual file fails, try sentence_XX format
    const fallbackPath = `audio/lesson_${lessonNum}/sentence_${sentNum}_${speed}.mp3`;
    const fallback = new Audio(getAudioUrl(fallbackPath));
    window._sentenceAudio = fallback;
    fallback.onended = onEnded || null;
    fallback.play().catch(() => {
      showToast('⚠️ 句子音频播放失败');
      // If this was triggered from blind mode, don't get stuck — move to judge
      if (typeof onEnded === 'function') onEnded();
    });
  });
}

// ============== 课文 Reading ==============
function renderReading() {
  const lesson = LESSONS[currentLesson];
  const container = document.getElementById('readingSentences');
  container.innerHTML = lesson.sentences.map((s, i) => {
    const imgNum = i + 1;
    const imgPath = `images/lesson_${String(currentLesson + 1).padStart(2, '0')}/s_${imgNum}.png`;
    return `
      <li class="sentence-with-img" data-idx="${i}" onclick="enterFullscreen(${i})">
        <img class="sent-img" src="${imgPath}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="sent-text">
          <div class="en">${s.en}</div>
          <div class="zh">${s.zh}</div>
        </div>
        <span class="sid">${s.id}</span>
      </li>
    `;
  }).join('');
  
  document.getElementById('readingProgressText').textContent = '自然朗读';
  document.getElementById('readingProgressFill').style.width = '0%';
  document.getElementById('readingTime').textContent = '0:00 / 0:00';
  document.getElementById('readingPlayBtn').onclick = toggleArticlePlay;
}

function toggleSentenceZh(idx) {
  const el = document.querySelector(`.sentence-with-img[data-idx="${idx}"]`);
  if (el) el.classList.toggle('show-zh');
}

function toggleReadingZh() {
  const items = document.querySelectorAll('.sentence-with-img');
  const anyVisible = document.querySelector('.sentence-with-img.show-zh');
  items.forEach(el => el.classList.toggle('show-zh', !anyVisible));
}

// ============== 全屏翻页阅读 Fullscreen Reading ==============
let fullscreenState = {
  currentIdx: 0,
  total: 0,
  showZh: false,
  isTransitioning: false,
  autoPlayTimer: null,
};

function enterFullscreen(idx) {
  const lesson = LESSONS[currentLesson];
  if (!lesson || !lesson.sentences || lesson.sentences.length === 0) return;

  fullscreenState.currentIdx = idx;
  fullscreenState.total = lesson.sentences.length;
  fullscreenState.showZh = false;

  document.getElementById('fullscreenPanel').classList.remove('hidden');
  document.getElementById('fullscreenTitle').textContent = `L${lesson.id} ${lesson.title}`;
  document.getElementById('fullscreenZhBtn').classList.remove('active');

  // Hide scrollbar on body
  document.body.style.overflow = 'hidden';

  renderFullscreenPage();
  playFullscreenAudio();
}

function exitFullscreen() {
  document.getElementById('fullscreenPanel').classList.add('hidden');
  document.body.style.overflow = '';

  // Stop audio
  if (window._sentenceAudio) {
    window._sentenceAudio.pause();
    window._sentenceAudio.onended = null;
    window._sentenceAudio = null;
  }
  if (fullscreenState.autoPlayTimer) {
    clearTimeout(fullscreenState.autoPlayTimer);
    fullscreenState.autoPlayTimer = null;
  }
}

function toggleFullscreenZh() {
  fullscreenState.showZh = !fullscreenState.showZh;
  const zhEl = document.getElementById('fullscreenSentenceZh');
  zhEl.classList.toggle('show', fullscreenState.showZh);
  document.getElementById('fullscreenZhBtn').classList.toggle('active', fullscreenState.showZh);
}

function renderFullscreenPage(direction) {
  const lesson = LESSONS[currentLesson];
  const idx = fullscreenState.currentIdx;
  const s = lesson.sentences[idx];

  // Image
  const imgNum = idx + 1;
  const imgPath = `images/lesson_${String(currentLesson + 1).padStart(2, '0')}/s_${imgNum}.png`;
  const imgEl = document.getElementById('fullscreenImg');
  imgEl.src = imgPath;
  imgEl.style.display = '';
  // Reset onerror so previously hidden images show again
  imgEl.onerror = function() { this.style.display = 'none'; };

  // Sentence text
  document.getElementById('fullscreenSentence').textContent = s.en;
  document.getElementById('fullscreenSentenceZh').textContent = s.zh;
  const zhEl = document.getElementById('fullscreenSentenceZh');
  zhEl.classList.toggle('show', fullscreenState.showZh);

  // Page number
  document.getElementById('fullscreenPageNum').innerHTML = `第 ${idx+1}/${fullscreenState.total} 句`;

  // Dots
  document.getElementById('fullscreenDots').innerHTML = lesson.sentences.map((_, i) => {
    let cls = 'fullscreen-dot';
    if (i === idx) cls += ' active';
    else if (i < idx) cls += ' done';
    return `<span class="${cls}"></span>`;
  }).join('');

  // Page turn animation
  if (direction === 1) {
    const body = document.getElementById('fullscreenBody');
    body.classList.remove('page-turn-enter-back', 'page-turn-exit');
    body.classList.add('page-turn-enter');
    setTimeout(() => body.classList.remove('page-turn-enter'), 400);
  } else if (direction === -1) {
    const body = document.getElementById('fullscreenBody');
    body.classList.remove('page-turn-enter', 'page-turn-exit');
    body.classList.add('page-turn-enter-back');
    setTimeout(() => body.classList.remove('page-turn-enter-back'), 400);
  }
}

function pageTurn(dir) {
  const newIdx = fullscreenState.currentIdx + dir;
  if (newIdx < 0 || newIdx >= fullscreenState.total) return;
  if (fullscreenState.isTransitioning) return;

  fullscreenState.isTransitioning = true;
  fullscreenState.currentIdx = newIdx;

  // Stop any playing audio
  if (window._sentenceAudio) {
    window._sentenceAudio.pause();
    window._sentenceAudio.onended = null;
    window._sentenceAudio = null;
  }
  if (fullscreenState.autoPlayTimer) {
    clearTimeout(fullscreenState.autoPlayTimer);
    fullscreenState.autoPlayTimer = null;
  }

  renderFullscreenPage(dir);
  playFullscreenAudio();

  setTimeout(() => {
    fullscreenState.isTransitioning = false;
  }, 400);
}

function playFullscreenAudio() {
  const idx = fullscreenState.currentIdx;
  playSentence(idx, false);

  // Auto-advance after audio finishes
  if (window._sentenceAudio) {
    window._sentenceAudio.onended = () => {
      window._sentenceAudio.onended = null;
      // Small delay then auto-advance
      fullscreenState.autoPlayTimer = setTimeout(() => {
        if (fullscreenState.currentIdx < fullscreenState.total - 1) {
          pageTurn(1);
        }
      }, 1500);
    };
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const panel = document.getElementById('fullscreenPanel');
  if (panel.classList.contains('hidden')) return;

  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    pageTurn(-1);
  } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    pageTurn(1);
  } else if (e.key === 'Escape') {
    exitFullscreen();
  } else if (e.key === 'c' || e.key === 'C') {
    toggleFullscreenZh();
  }
});

function showBlindPhase(phase) {

function updateBlindDots() {
  const lesson = LESSONS[currentLesson];
  const total = lesson.sentences.length;
  const current = blindState.current;
  
  document.getElementById('blindResult').innerHTML = blindState.history.map((h, i) => {
    if (h === 'got') return '<span class="blind-result-item got">✓</span>';
    if (h === 'not-got') return '<span class="blind-result-item not-got">✗</span>';
    if (i === current) return '<span class="blind-result-item active-dot">◉</span>';

  }).join('');

function startBlind() {
  const lesson = LESSONS[currentLesson];
  
  // If completed, reset entirely
  if (blindState.current >= lesson.sentences.length) {
    blindState = { current: 0, history: [], isPaused: false, audioEl: null };
    blindState.history = lesson.sentences.map(() => 'pending');
    document.getElementById('blindStartBtn').textContent = '▶ 开始盲听';
    document.getElementById('blindTranscript').textContent = '';
    document.getElementById('blindTranscript').classList.remove('reveal');
  }
  
  playBlindSentence();
}

function playBlindSentence() {
  const lesson = LESSONS[currentLesson];
  if (blindState.current >= lesson.sentences.length) return;
  
  const idx = blindState.current;
  const s = lesson.sentences[idx];
  if (!s) return;
  
  // Clear any revealed text
  const transcript = document.getElementById('blindTranscript');
  transcript.textContent = '';
  transcript.classList.remove('reveal');
  
  // Show playing indicator
  document.getElementById('blindState').textContent = `🔊 盲听第 ${idx+1}/${lesson.sentences.length} 句...`;
  
  // Show play phase (state text only, no controls needed)
  showBlindPhase('play');

  playSentence(idx, false, () => {

function onBlindAudioEnded() {
  const lesson = LESSONS[currentLesson];
  const idx = blindState.current;
  
  // Show judgment phase
  showBlindPhase('judge');
  document.getElementById('blindState').textContent = `第 ${idx+1}/${lesson.sentences.length} 句 — 你听懂了吗？`;
  updateBlindDots();

function pauseBlind() {
  const audio = window._sentenceAudio || blindState.audioEl;
  if (!audio) return;
  
  if (audio.paused) {
    audio.play().catch(() => {});
    blindState.isPaused = false;
    document.getElementById('blindPauseBtn').textContent = '⏸';
  } else {
    audio.pause();
    blindState.isPaused = true;
    document.getElementById('blindPauseBtn').textContent = '▶';

function handleBlindResponse(got) {
  const lesson = LESSONS[currentLesson];
  if (blindState.current >= lesson.sentences.length) return;
  
  const s = lesson.sentences[blindState.current];
  
  // Record result
  blindState.history[blindState.current] = got ? 'got' : 'not-got';
  
  // If got, reveal sentence text
  const transcript = document.getElementById('blindTranscript');
  if (got) {
    transcript.textContent = s.en;
    transcript.classList.add('reveal');
  }
  
  updateBlindDots();
  blindState.current++;
  
  // Check if done
  if (blindState.current >= lesson.sentences.length) {
    document.getElementById('blindState').textContent = '🎉 盲听完成！看看你的成绩';
    document.getElementById('blindStartBtn').textContent = '🔄 重新盲听';

    return;
  }
  
  // Auto-start next sentence with brief transition
  document.getElementById('blindState').textContent = `✓ 已记录 — 准备听第 ${blindState.current+1} 句`;
  cleanupBlindAudio();
  setTimeout(() => playBlindSentence(), 800);

}

function replayBlindAll() {
  const lesson = LESSONS[currentLesson];
  blindState = { current: 0, history: [], isPaused: false, audioEl: null };
  blindState.history = lesson.sentences.map(() => 'pending');

function cleanupBlindAudio() {

    blindState.audioEl = null;

// ============== 精听 Intensive Listening ==============
/** Normalize a word to its base form for dictionary matching */
function normalizeWord(word) {
  const w = word.toLowerCase();
  // Common English suffixes
  const suffixes = [
    { s: "'s", r: "" },     // Tom's → Tom
    { s: "ies", r: "y" },   // carries → carry
    { s: "ves", r: "f" },   // leaves → leaf
    { s: "es", r: "" },     // watches → watch, goes → go
    { s: "ing", r: "" },    // going → go
    { s: "ed", r: "" },     // walked → walk
    { s: "ly", r: "" },     // slowly → slow
    { s: "er", r: "" },     // bigger → big
    { s: "est", r: "" },    // biggest → big
    { s: "s", r: "" },      // cats → cat
    { s: "d", r: "" },      // liked → like
    { s: "n't", r: " not" },// don't → do not
  ];
  for (const { s, r } of suffixes) {
    if (w.endsWith(s) && w.length > s.length + 1) {
      return w.slice(0, -s.length) + r;
    }
  }
  return w;
}

function renderIntensive() {
  const lesson = LESSONS[currentLesson];
  const container = document.getElementById('intensiveSentences');
  
  container.innerHTML = lesson.sentences.map((s, i) => {
    const tokens = s.en.split(/(\s+)/).map((token, ti) => {
      if (token.trim() === '') return token;
      const cleanWord = token.replace(/[^a-zA-Z'-]/g, '');
      if (!cleanWord) return token;
      // Try exact match first, then normalized match
      const base = normalizeWord(cleanWord);
      let found = s.words.find(w => w.word.toLowerCase() === cleanWord.toLowerCase());
      if (!found) {
        found = s.words.find(w => w.word.toLowerCase() === base);
      }
      const engDef = found ? (found.eng_def || '') : '';
      const chnDef = found ? (found.def || '') : '';
      // Escape for onclick attr safely
      const safeWord = cleanWord.replace(/'/g, "\\'");
      const safeChn = chnDef.replace(/'/g, "\\'");
      const safeEng = engDef.replace(/'/g, "\\'");
      return `<span class="word" onclick="showWordPopup(event,'${safeWord}','${safeChn}','${safeEng}',${i})">${token}</span>`;
    });
    
    return `
      <div class="intensive-sentence" onclick="playIntensiveSentence(${i})">
        <div class="en">${tokens.join('')}</div>
      </div>
    `;
  }).join('');
}

function playIntensiveSentence(idx) {
  const lesson = LESSONS[currentLesson];
  const s = lesson.sentences[idx];
  
  playSentence(idx, false);
  
  // Highlight
  document.querySelectorAll('.intensive-sentence').forEach((el, i) => {
    el.style.background = i === idx ? 'var(--primary-bg)' : 'transparent';
  });
}

function showWordPopup(event, word, chineseDef, engDef, sentenceIdx) {
  event.stopPropagation();
  const popupWord = document.getElementById('popupWord');
  const popupIpa = document.getElementById('popupIpa');
  const popupDef = document.getElementById('popupDef');
  
  popupWord.textContent = word;
  // Hide IPA section if no data (we'll show a phonetic hint from TTS instead)
  popupIpa.textContent = '';
  popupIpa.style.display = 'none';
  
  // Show definitions
  let defHtml = '';
  if (chineseDef) {
    defHtml += `<div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px;">${chineseDef}</div>`;
  }
  if (engDef) {
    defHtml += `<div style="font-size:14px;color:var(--text-muted);line-height:1.5;">${engDef}</div>`;
  }
  if (!chineseDef && !engDef) {
    defHtml = '<div style="font-size:14px;color:var(--text-muted);">暂未收录该词释义</div>';
  }
  popupDef.innerHTML = defHtml;
  
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('wordPopup').classList.remove('hidden');
  
  // Auto-pronounce the word (not the full sentence)
  pronounceWord(word);
  
  // Bind play button to pronounce the word only
  const playBtn = document.getElementById('popupPlayBtn');
  playBtn.onclick = (e) => {
    e.stopPropagation();
    pronounceWord(word);
  };
  playBtn.textContent = '🔊 朗读单词';
}

/** Pronounce a single word using browser TTS */
function pronounceWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  window.speechSynthesis.speak(utter);
}

function closeWordPopup() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('wordPopup').classList.add('hidden');
}

document.getElementById('popupCloseBtn').addEventListener('click', closeWordPopup);

function repeatPlayCurrentSentence() {

/** Navigate to previous sentence */
function repeatPrevSentence() {

  if (window._sentenceAudio) { window._sentenceAudio.pause(); window._sentenceAudio.onended = null; window._sentenceAudio = null; }
  if (repeatAudio) { repeatAudio.pause(); repeatAudio = null; }

/** Navigate to next sentence (just view, don't skip record) */
function repeatNextSentence() {
  const lesson = LESSONS[currentLesson];
  if (repeatState.current >= lesson.sentences.length - 1) return;
  
  // Cleanup audio
  if (window._sentenceAudio) { window._sentenceAudio.pause(); window._sentenceAudio.onended = null; window._sentenceAudio = null; }
  if (repeatAudio) { repeatAudio.pause(); repeatAudio = null; }

  repeatState.current++;

/** Toggle recording start/stop */
async function repeatToggleRecord() {
  const idx = repeatState.current;
  const lesson = LESSONS[currentLesson];
  if (idx >= lesson.sentences.length) return;

  if (!isRecording) {
    // Start recording
    try {
      // Stop any playing audio
      if (window._sentenceAudio) { window._sentenceAudio.pause(); window._sentenceAudio.onended = null; window._sentenceAudio = null; }
      if (repeatAudio) { repeatAudio.pause(); repeatAudio = null; }
      if (repeatRecordingAudio) { repeatRecordingAudio.pause(); repeatRecordingAudio = null; }
      document.getElementById('repeatListening').classList.add('hidden');
      document.getElementById('repeatResultPanel').classList.add('hidden');
      
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      repeatState.recordingBlob = null;
      if (repeatState.recordingUrl) {
        URL.revokeObjectURL(repeatState.recordingUrl);
        repeatState.recordingUrl = null;
      }

      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        // Create blob URL for playback
        repeatState.recordingBlob = new Blob(recordedChunks, { type: 'audio/webm' });
        repeatState.recordingUrl = URL.createObjectURL(repeatState.recordingBlob);
        
        // Generate sub-scores
        const subScores = repeatGenerateSubScores();
        // Overall score
        const totalScore = Math.round(subScores.reduce((a, b) => a + b, 0) / subScores.length);
        repeatState.scores.push(totalScore);
        repeatShowResult(totalScore, subScores);
      };
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('repeatRecordBtn').classList.add('recording');
      document.getElementById('repeatRecordBtn').textContent = '⏹';
      showToast('🎤 录音中...点击停止');
    } catch (e) {
      showToast('⚠️ 录音权限未授予');
    }
  } else {
    // Stop recording
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('repeatRecordBtn').classList.remove('recording');
    document.getElementById('repeatRecordBtn').textContent = '🎙️';
  }
}

/** Generate mock sub-scores for demonstration */
function repeatGenerateSubScores() {
  const pronunciation = 60 + Math.floor(Math.random() * 35);
  const fluency = 60 + Math.floor(Math.random() * 35);
  const accuracy = 60 + Math.floor(Math.random() * 35);
  const intonation = 60 + Math.floor(Math.random() * 35);
  return [pronunciation, fluency, accuracy, intonation];
}

/** Show the result panel with sub-scores and actions */
function repeatShowResult(totalScore, subScores) {
  const resultPanel = document.getElementById('repeatResultPanel');
  const subLabels = ['发音 Pronunciation', '流利度 Fluency', '准确度 Accuracy', '语调 Intonation'];
  
  // Show total score
  document.getElementById('repeatResultTotal').innerHTML = `总分：<strong>${totalScore}</strong> 分`;
  
  // Generate sub-score bars
  let subHtml = '';
  subScores.forEach((score, i) => {
    let color;
    if (score >= 85) color = 'var(--success)';
    else if (score >= 60) color = 'var(--warning)';
    else color = 'var(--danger)';
    subHtml += `
      <div class="sub-score-row">
        <span class="sub-score-label">${subLabels[i]}</span>
        <div class="sub-score-bar">
          <div class="sub-score-fill" style="width:${score}%;background:${color};"></div>
        </div>
        <span class="sub-score-num" style="color:${color};">${score}</span>
      </div>
    `;
  });
  document.getElementById('repeatSubScores').innerHTML = subHtml;
  
  // Update next sentence button text
  const lesson = LESSONS[currentLesson];
  const isLast = repeatState.current >= lesson.sentences.length - 1;
  const nextBtn = document.getElementById('repeatNextSentenceBtn');
  nextBtn.textContent = isLast ? '🎉 完成跟读' : '下一句 →';
  
  // Reset playback button
  document.getElementById('repeatPlaybackBtn').textContent = '▶';
  document.getElementById('repeatPlaybackStatus').textContent = '';
  
  resultPanel.classList.remove('hidden');
}

/** Play back the recorded audio */
function repeatPlayRecording() {
  if (!repeatState.recordingUrl) {
    showToast('⚠️ 没有录音可回放');
    return;
  }
  
  const playBtn = document.getElementById('repeatPlaybackBtn');
  const status = document.getElementById('repeatPlaybackStatus');
  
  if (repeatRecordingAudio && !repeatRecordingAudio.paused) {
    repeatRecordingAudio.pause();
    playBtn.textContent = '▶';
    status.textContent = '';
    return;
  }
  
  if (repeatRecordingAudio) {
    repeatRecordingAudio = null;
  }
  
  repeatRecordingAudio = new Audio(repeatState.recordingUrl);
  repeatRecordingAudio.onended = () => {
    playBtn.textContent = '▶';
    status.textContent = '';
  };
  repeatRecordingAudio.play().then(() => {
    playBtn.textContent = '⏸';
    status.textContent = '播放中...';
  }).catch(() => {
    showToast('⚠️ 回放失败');
  });
}

/** Re-record the current sentence */
function repeatReRecord() {
  // Cleanup
  if (repeatRecordingAudio) { repeatRecordingAudio.pause(); repeatRecordingAudio = null; }
  if (repeatState.recordingUrl) {
    URL.revokeObjectURL(repeatState.recordingUrl);
    repeatState.recordingUrl = null;
  }
  repeatState.recordingBlob = null;
  
  // Remove last score (will be replaced on re-record)
  if (repeatState.scores.length > 0) {
    repeatState.scores.pop();
  }
  
  document.getElementById('repeatResultPanel').classList.add('hidden');
  showToast('🔄 开始重新录音');
  repeatToggleRecord(); // Start new recording
}

/** Go to next sentence after satisfied with recording */
function repeatGoNext() {
  const lesson = LESSONS[currentLesson];
  
  // Cleanup audio
  if (window._sentenceAudio) { window._sentenceAudio.pause(); window._sentenceAudio.onended = null; window._sentenceAudio = null; }
  if (repeatAudio) { repeatAudio.pause(); repeatAudio = null; }
  if (repeatRecordingAudio) { repeatRecordingAudio.pause(); repeatRecordingAudio = null; }
  if (repeatState.recordingUrl) {
    URL.revokeObjectURL(repeatState.recordingUrl);
    repeatState.recordingUrl = null;
  }
  repeatState.recordingBlob = null;
  
  document.getElementById('repeatResultPanel').classList.add('hidden');
  
  if (repeatState.current >= lesson.sentences.length - 1) {
    // All done
    repeatState.current = lesson.sentences.length;
    renderRepeat();
    showToast('🎉 跟读全部完成！');
  } else {
    repeatState.current++;
    repeatState.showResult = false;
    renderRepeat();
  }
}

// ============== 测试 Quiz ==============
function renderQuiz() {
  const lesson = LESSONS[currentLesson];
  const questions = lesson.questions;
  
  if (!questions || questions.length === 0) {
    document.getElementById('quizContent').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">暂无测试题</p>';
    return;
  }
  
  if (quizState.done) {
    showQuizResults();
    return;
  }
  
  const q = questions[quizState.current];
  if (!q) {
    quizState.done = true;
    showQuizResults();
    return;
  }
  
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-score">
      <span class="big">${quizState.answers.length}</span><span class="total"> / ${questions.length}</span>
    </div>
    <div class="quiz-question">${q.question}</div>
    <div id="quizOptions">
      ${q.options.map((opt, i) => `
        <button class="quiz-option" data-opt="${i}" onclick="answerQuiz(${i})">${String.fromCharCode(65+i)}. ${opt}</button>
      `).join('')}
    </div>
    <div id="quizFeedback" class="hidden"></div>
  `;
}

function answerQuiz(idx) {
  const lesson = LESSONS[currentLesson];
  const q = lesson.questions[quizState.current];
  const isCorrect = q.options[idx] === q.answer || idx === q.answer;
  
  // Disable all options
  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.disabled = true;
    const optIdx = parseInt(btn.dataset.opt);
    if (q.options[optIdx] === q.answer || optIdx === q.answer) btn.classList.add('correct');
    if (optIdx === idx && !isCorrect) btn.classList.add('wrong');
  });
  
  // Show feedback
  const feedback = document.getElementById('quizFeedback');
  feedback.classList.remove('hidden');
  
  // Find the original sentence that contains the answer
  const answerText = q.options.length === 4 
    ? (typeof q.answer === 'number' ? q.options[q.answer] : q.answer)
    : q.options[idx];
  
  // Simple scoring
  quizState.answers.push(isCorrect);
  
  feedback.innerHTML = `
    <div class="quiz-result ${isCorrect ? 'correct' : 'wrong'}">
      ${isCorrect ? '✅ 答对了！' : '❌ 答错了'}
      <br><br>
      <button class="quiz-next" onclick="nextQuestion()">${quizState.current < lesson.questions.length - 1 ? '下一题 →' : '查看成绩'}</button>
    </div>
  `;
}

function nextQuestion() {
  quizState.current++;
  renderQuiz();
}

function showQuizResults() {
  const lesson = LESSONS[currentLesson];
  const correct = quizState.answers.filter(a => a).length;
  const total = lesson.questions.length;
  const pct = Math.round(correct / total * 100);
  
  document.getElementById('quizContent').innerHTML = `
    <div style="text-align:center;padding:20px;">
      <div style="font-size:64px;margin-bottom:12px;">${pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪'}</div>
      <div class="quiz-score">
        <span class="big">${correct}</span><span class="total"> / ${total}</span>
      </div>
      <div style="font-size:24px;font-weight:700;margin-bottom:8px;">${pct}%</div>
      <div style="color:var(--text-muted);margin-bottom:24px;">
        ${pct >= 80 ? '太棒了！你对课文理解很好！' : pct >= 50 ? '不错，再复习一下跟读吧！' : '建议重新学习这篇课文'}
      </div>
      <button class="quiz-next" onclick="resetQuiz()">🔄 重新测试</button>
    </div>
  `;
}

function resetQuiz() {
  quizState = { current: 0, answers: [], done: false };
  renderQuiz();
}

// ============== Voice: TTS & Speech-to-Text ==============
let ttsEnabled = true; // Global TTS toggle, persists across conversations

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('aiTtsToggle');
  btn.classList.toggle('active', ttsEnabled);
  btn.textContent = ttsEnabled ? '🔊 TTS' : '🔇 TTS';
  if (!ttsEnabled) {
    window.speechSynthesis.cancel();
  }
}

/**
 * Speak text using Web Speech API (TTS)
 * @param {string} text - Text to speak
 * @returns {SpeechSynthesisUtterance|null}
 */
function speakText(text) {
  if (!ttsEnabled || !text) return null;
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.9;  // Slightly slower for language learners
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  // Try to find a natural English voice
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && /female|zira/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utterance.voice = enVoice;

  window.speechSynthesis.speak(utterance);
  return utterance;
}

/**
 * Called when user clicks the speaker icon on an AI message
 */
function replaySpeaker(btn) {
  const text = btn.dataset.text;
  if (!text) return;
  if (btn.classList.contains('speaking')) {
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    return;
  }
  btn.classList.add('speaking');
  const utterance = speakText(text);
  if (utterance) {
    utterance.onend = () => btn.classList.remove('speaking');
    utterance.onerror = () => btn.classList.remove('speaking');
  } else {
    btn.classList.remove('speaking');
  }
}

// Speech-to-text (voice input)
let voiceRecognition = null;
let voiceIsRecording = false;

function toggleVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('Voice input is not supported in this browser. Try Chrome or Edge.');
    return;
  }

  if (voiceIsRecording) {
    stopVoiceInput();
    return;
  }

  voiceIsRecording = true;
  const micBtn = document.getElementById('aiMicBtn');
  const statusEl = document.getElementById('aiVoiceStatus');
  micBtn.classList.add('recording');
  micBtn.textContent = '⏹';
  statusEl.textContent = '🎤 Listening... Speak in English';
  statusEl.className = 'ai-voice-status recording';

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'en-US';
  voiceRecognition.continuous = false;
  voiceRecognition.interimResults = true;
  voiceRecognition.maxAlternatives = 1;

  voiceRecognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += transcript;
      } else {
        interim += transcript;
      }
    }
    if (interim) {
      statusEl.textContent = `🎤 ${interim}`;
      document.getElementById('aiChatInput').placeholder = interim;
    }
    if (final) {
      const input = document.getElementById('aiChatInput');
      input.value = final;
      input.placeholder = 'Type your answer in English...';
      statusEl.textContent = '✅ Voice captured!';
      statusEl.className = 'ai-voice-status done';
      stopVoiceInput();
      // Auto-send after brief delay
      setTimeout(() => sendAIMessage(), 600);
    }
  };

  voiceRecognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error === 'no-speech') {
      statusEl.textContent = '🎤 No speech detected. Try again.';
    } else if (event.error === 'aborted') {
      statusEl.textContent = '';
    } else {
      statusEl.textContent = `⚠️ ${event.error}`;
    }
    statusEl.className = 'ai-voice-status';
    // Don't fully stop on no-speech so user can try again
    if (event.error !== 'no-speech') {
      stopVoiceInput();
    } else {
      // Restart listening
      setTimeout(() => {
        if (voiceIsRecording) {
          try { voiceRecognition.start(); } catch(e) {}
        }
      }, 500);
    }
  };

  voiceRecognition.onend = () => {
    if (voiceIsRecording) {
      // If ended naturally without result, restart
      try { voiceRecognition.start(); } catch(e) {
        stopVoiceInput();
      }
    }
  };

  try {
    voiceRecognition.start();
  } catch(e) {
    stopVoiceInput();
    showToast('Could not start voice recognition.');
  }
}

function stopVoiceInput() {
  voiceIsRecording = false;
  const micBtn = document.getElementById('aiMicBtn');
  const statusEl = document.getElementById('aiVoiceStatus');
  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤';
  if (voiceRecognition) {
    try { voiceRecognition.abort(); } catch(e) {}
    try { voiceRecognition.stop(); } catch(e) {}
    voiceRecognition = null;
  }
}
